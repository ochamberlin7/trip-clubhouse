<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Trip Clubhouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #f5f5f5; color: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
      #boot-msg { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
      #boot-msg .spinner {
        width: 40px; height: 40px;
        border: 4px solid rgba(27, 63, 110, 0.15);
        border-top-color: #1B3F6E;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      #fatal-error { display: none; padding: 32px; }
      #fatal-error h2 { color: #ef4444; margin-bottom: 12px; font-size: 20px; }
      #fatal-error pre { background: #fff; padding: 16px; border-radius: 8px; font-size: 13px; color: #dc2626; white-space: pre-wrap; overflow-x: auto; border: 1px solid #fecaca; }
    </style>
  </head>
  <body>
    <!-- Centered loading spinner; hidden (display:none) as soon as React mounts -->
    <div id="boot-msg"><div class="spinner"></div></div>

    <div id="fatal-error">
      <h2>⚠ JavaScript error — app could not load</h2>
      <pre id="fatal-error-msg">Capturing error…</pre>
    </div>

    <div id="root"></div>

    <script>
      function showFatal(text) {
        document.getElementById('boot-msg').style.display = 'none';
        var box = document.getElementById('fatal-error');
        box.style.display = 'block';
        document.getElementById('fatal-error-msg').textContent = text;
      }

      window.addEventListener('error', function(e) {
        showFatal(
          (e.message || 'Unknown error') +
          '\n\nFile: ' + (e.filename || 'unknown') + ':' + e.lineno +
          '\n\n' + (e.error && e.error.stack ? e.error.stack : '')
        );
      });

      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason;
        showFatal(
          'Unhandled Promise rejection:\n' +
          (reason && reason.stack ? reason.stack : String(reason))
        );
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
